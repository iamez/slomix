exclude_paths:
  - "bot/schema.sql"
  - "schema.sql"
  - "tools/schema_postgresql.sql"
  - "website/migrations/005_date_based_availability.sql"
  - "website/js/utils.js"
  # Archive directories contain intentionally deprecated scripts (reference copies only)
  - "scripts/archive/**"
  - "tools/archive/**"
  # Test fixtures and migration SQL files
  - "tests/fixtures/**"
  - "website/migrations/**"
  - "migrations/**"
  # Minified build output — generated by Vite, not hand-written code
  - "website/static/modern/chunks/**"
  - "website/static/modern/route-host.js"
  # Test files — style issues in tests are not production concerns
  - "tests/**"
  # Documentation and non-code assets
  - "docs/**"
