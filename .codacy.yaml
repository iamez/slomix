exclude_paths:
  - "bot/schema.sql"
  - "schema.sql"
  - "tools/schema_postgresql.sql"
  - "website/migrations/005_date_based_availability.sql"
  - "website/js/utils.js"
  # Archive directories contain intentionally deprecated scripts (reference copies only)
  - "scripts/archive/**"
  - "tools/archive/**"
  # Test fixtures and migration SQL files
  - "tests/fixtures/**"
  - "website/migrations/**"
  - "migrations/**"
  # PostgreSQL-dialect psql scripts — Codacy runs TSQLLint (T-SQL) on *.sql,
  # which false-positives on PG syntax (same reason migrations are excluded)
  - "scripts/backtest_*.sql"
  # Minified build output — generated by Vite, not hand-written code
  - "website/static/modern/chunks/**"
  - "website/static/modern/route-host.js"
  # Test files — style issues in tests are not production concerns
  - "tests/**"
  # Documentation and non-code assets
  - "docs/**"
  # Dependency advisories for the web manifest are enforced by the CI
  # pip-audit step (tests.yml security job) with TIME-BOXED, owner-accepted
  # ignores for the starlette 0.x line (drops with the 1.x migration).
  # Codacy's trivy pass has no per-advisory ignore mechanism, so it would
  # permanently re-report that same accepted debt on every PR touching the
  # file. The root requirements.txt stays Codacy-covered.
  - "website/requirements.txt"
