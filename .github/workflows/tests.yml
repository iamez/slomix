name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  python:
    name: Python Lint + Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14.15-alpine
        env:
          POSTGRES_USER: etlegacy_user
          POSTGRES_PASSWORD: etlegacy_test_password
          POSTGRES_DB: etlegacy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etlegacy_user -d etlegacy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history: the whitespace gate below diffs against the PR base /
          # pre-push SHA, which a shallow checkout does not contain (IMP-009).
          fetch-depth: 0

      - name: Whitespace hygiene (git diff --check)
        # IMP-009: reject trailing whitespace / stray CR introduced by this
        # change set (pre-existing issues on untouched lines don't fail —
        # diff --check only inspects added lines). Base SHA differs by event:
        # PR → the PR base; push → the pre-push SHA (guarded: a forced push or
        # branch creation can yield an unknown/zero SHA → skip with a note).
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "No usable base SHA ('$BASE') — skipping whitespace gate."
            exit 0
          fi
          # Markdown is excluded: a trailing double-space is VALID Markdown
          # (hard line break), so gating .md would forbid legitimate syntax.
          git diff --check "$BASE"...HEAD -- . ':(exclude)*.md'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint Python
        run: ruff check bot/ website/backend/

      - name: Dependency consistency (pip check)
        # Catches incompatible transitive pins (e.g. a fastapi/starlette bump
        # that leaves an unsatisfiable requirement) before they reach a deploy.
        run: pip check

      - name: Run tests
        env:
          POSTGRES_TEST_HOST: localhost
          POSTGRES_TEST_PORT: 5432
          POSTGRES_TEST_DATABASE: etlegacy_test
          POSTGRES_TEST_USER: etlegacy_user
          POSTGRES_TEST_PASSWORD: etlegacy_test_password
          CACHE_BACKEND: memory
          PROMETHEUS_ENABLED: "false"
          SESSION_SECRET: ci-test-secret-not-for-production
          INTERNAL_API_SECRET: ci-test-secret-not-for-production
        run: pytest tests/ -v --tb=short --cov=bot --cov=website/backend --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673  # v4.5.0 — bump to v5+ requires `file:` → `files:` rename
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false  # No Codecov token configured; don't block CI

  javascript:
    name: JavaScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.13.1"
          cache: "npm"
      - name: Install frontend tooling
        run: npm ci
      - name: Lint JavaScript
        run: npm run lint:js

  react-frontend:
    name: React Typecheck + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.13.1"
          cache: "npm"
          cache-dependency-path: website/frontend/package-lock.json
      - name: Install React frontend dependencies
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm test

  shellcheck:
    name: ShellCheck (deploy + ops scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: ShellCheck all tracked shell scripts
        # Gate EVERY tracked shell script at error severity (AUD-012), not just
        # scripts/*.sh: install.sh, slomix_vm_setup.sh, website/start_website.sh,
        # tools/*.sh and the sourced scripts/release_configs/*.sh are all part of
        # the production bootstrap/release surface, so a quoting/`cd` slip there
        # is just as real a hazard (Copilot/Codex review on #514). Enumerating via
        # `git ls-files '*.sh'` means new scripts are covered automatically and
        # the list can't drift. Style warnings (SC2006 etc.) are not gated yet —
        # ratchet to -S warning once the existing style debt is cleared.
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          mapfile -t sh_files < <(git ls-files '*.sh')
          printf 'ShellCheck: %d tracked shell script(s)\n' "${#sh_files[@]}"
          shellcheck -S error "${sh_files[@]}"

  security:
    name: Security (pip-audit + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.10.0 bandit==1.9.4

      - name: Dependency audit (pip-audit)
        # TIME-BOXED IGNORES (audit AUD-009) — owner: iamez. Re-evaluate by
        # 2026-10-01. The starlette-stack entries drop when the FastAPI/starlette
        # 1.x migration lands (every fix is a 1.x MAJOR needing a compat pass);
        # the request-routing advisory in that stack is separately mitigated at
        # runtime. The paramiko entry drops when an upstream fix ships (none yet).
        # Every OTHER package is gated, so a newly disclosed CVE elsewhere fails
        # this job. Advisory IDs live only in the --ignore-vuln flags below.
        run: |
          pip-audit -r requirements.txt --progress-spinner=off \
            --ignore-vuln CVE-2026-44405 \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-249 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln CVE-2026-48818 \
            --ignore-vuln CVE-2026-48817
          # The website venv is built from its own manifest (rsync_deploy_vm.sh,
          # slomix_vm_setup.sh) — audit it too so the web app can't lag on a
          # vulnerable pin. Since the observability pins (IMP-005), the
          # instrumentator constrains starlette<1.0, so the same time-boxed
          # starlette-stack ignores as the root audit apply here (no paramiko
          # in this manifest). PYSEC-2026-2280/2281 alias the two CVE ignores
          # above under their PYSEC ids.
          pip-audit -r website/requirements.txt --progress-spinner=off \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-249 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln PYSEC-2026-2280 \
            --ignore-vuln PYSEC-2026-2281

      - name: Website dependency consistency (isolated pip check)
        # The web service deploys from website/requirements.txt into its OWN venv
        # (rsync_deploy_vm.sh / slomix_vm_setup.sh), so an incompatible pin there
        # slips past the root `pip check` in the python job, which resolves the
        # dev/root manifests. Install the web manifest into a throwaway venv and
        # check it in isolation so the deployed web venv can't be left broken
        # (Codex review on #514).
        run: |
          python -m venv /tmp/webvenv
          /tmp/webvenv/bin/pip install --upgrade pip
          /tmp/webvenv/bin/pip install -r website/requirements.txt
          /tmp/webvenv/bin/pip check

      - name: Static security scan (bandit)
        # Config in pyproject.toml [tool.bandit]: -ll = medium+ severity. B608 is a
        # documented SQL false-positive class (whitelisted identifiers, parameterized
        # values); intentional B601/B104 sites carry targeted `# nosec`. Targets cover
        # every runtime Python package (bot, website backend, the shared package
        # imported by the backend, proximity parser, greatshot, the deployed
        # vps_scripts watcher, the root DB manager); tests/tools/scripts/migrations
        # are excluded via pyproject [tool.bandit].
        run: bandit -c pyproject.toml -r bot website/backend shared proximity greatshot vps_scripts postgresql_database_manager.py -ll

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python, javascript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build Docker images
        run: |
          cp website/.env.example .env 2>/dev/null || cp .env.example .env 2>/dev/null || true
          echo "POSTGRES_PASSWORD=ci_placeholder" >> .env
          echo "SESSION_SECRET=ci_placeholder" >> .env
          echo "INTERNAL_API_SECRET=ci_placeholder" >> .env
          echo "DISCORD_BOT_TOKEN=ci_placeholder" >> .env
          docker compose build api website
      - name: Validate Prometheus config + alert rules (promtool)
        # Same image tag docker-compose runs in production, so "promtool
        # accepts it" here means "prometheus will load it" there (IMP-005).
        run: |
          docker run --rm -v "$PWD/monitoring":/m:ro --entrypoint /bin/promtool \
            prom/prometheus:v2.54.1 check rules /m/alerts.yml
          docker run --rm -v "$PWD/monitoring":/m:ro --entrypoint /bin/promtool \
            prom/prometheus:v2.54.1 check config /m/prometheus.yml
