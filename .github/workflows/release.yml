name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          # Prefer a maintainer PAT when configured, so the release PR is authored
          # by a real identity and CI runs on it normally. The default GITHUB_TOKEN
          # deliberately CANNOT trigger further workflow runs (loop prevention),
          # which is why release PRs otherwise show "N workflows awaiting approval".
          # Falls back to GITHUB_TOKEN when the secret is unset, so this is safe to
          # merge before the PAT exists.
          #
          # RELEASE_PLEASE_TOKEN must be a LONG-LIVED fine-grained PAT (Contents:
          # RW, Pull requests: RW). Do NOT store a GitHub App *installation* token
          # here — those expire after ~1h, and once expired the non-empty secret is
          # still selected (so it won't fall back to GITHUB_TOKEN) and release-please
          # fails auth. To use a GitHub App instead, generate the token in an earlier
          # step (e.g. actions/create-github-app-token) and pass its output here.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
